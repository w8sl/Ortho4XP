name: Update nvcompress

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download nvcompress
      run: |
        mkdir -p temp/win
        mkdir -p temp/lin
        mkdir -p temp/mac
        wget https://github.com/w8sl/nvidia-texture-tools/releases/download/2025.04.25/nvtt-macos-latest.zip -O temp/mac/nvtt-macos-latest.zip
        wget https://github.com/w8sl/nvidia-texture-tools/releases/download/2025.04.25/nvtt-windows-latest.zip -O temp/win/nvtt-windows-latest.zip
        wget https://github.com/w8sl/nvidia-texture-tools/releases/download/2025.04.25/nvtt-ubuntu-22.04-arm.zip -O temp/lin/nvtt-ubuntu-22.04-arm.zip
        unzip temp/mac/nvtt-macos-latest.zip -d temp/mac/
        unzip temp/win/nvtt-windows-latest.zip -d temp/win/
        unzip temp/lin/nvtt-ubuntu-22.04-arm.zip -d temp/lin/
        
        cd temp
        ls -R
        cd ..
        
    - name: Make dirs
      run: |      
        mkdir -p Utils/lin/aarch64
        mkdir -p Utils/win/nvcompress/new
        mkdir -p Utils/mac/universal

    - name: Rename and move nvcompress
      run: |
        mv temp/lin/nvtt-ubuntu-22.04-arm/bin/nvcompress Utils/lin/aarch64/      
        mv temp/mac/nvtt-macos-latest/bin/nvcompress Utils/mac/universal/     
        mv temp/win/nvtt-windows-latest/bin/nvcompress.exe Utils/win/nvcompress/new/

    - name: Remove temp directory
      run: rm -rf temp/*
    
    - name: Create branch and commit changes
      run: |
         git config --global user.name 'github-actions[bot]'
         git config --global user.email 'github-actions[bot]@users.noreply.github.com'
         git checkout ${{ github.ref_name }}
         git add .
         git commit -m 'Update nvcompress'

    - name: Push changes
      run: git push origin ${{ github.ref_name }}
      
